version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: archive_db
      POSTGRES_USER: archive_user
      POSTGRES_PASSWORD: archive_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-data.sql:/docker-entrypoint-initdb.d/init-data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://archive_user:archive_password@postgres:5432/archive_db
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    command: sh -c "npx prisma migrate deploy && npm run server:prod"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:3001/api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
